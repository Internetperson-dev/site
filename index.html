<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Liquid Glass Links (WebGL Buttons)</title>

<style>
html,body{
  margin:0;
  background:radial-gradient(circle at top,#1b1b1b,#0e0e0e);
  font-family:system-ui;
  color:white;
  overflow-x:hidden;
  cursor:none;
}

/* layout */
.links{
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:18px;
  padding:60px;
}

/* WebGL button */
.liquid-btn{
  position:relative;
  width:340px;
  height:72px;
  border:none;
  padding:0;
  background:transparent;
  border-radius:24px;
  overflow:hidden;
  cursor:none;
}

.liquid-btn span{
  position:absolute;
  inset:0;
  display:flex;
  align-items:center;
  justify-content:center;
  z-index:2;
  font-weight:600;
  pointer-events:none;
  text-shadow:0 2px 10px rgba(0,0,0,.6);
}

.liquid-btn canvas{
  position:absolute;
  inset:0;
  width:100%;
  height:100%;
  display:block;
}
</style>
</head>

<body>

<div class="links">

<h1>Useful Links</h1>

<button class="liquid-btn" onclick="location.href='https://wolfyxon.github.io/3ds-web-stuff/'">
  <canvas></canvas><span>3DS Games</span>
</button>

<button class="liquid-btn" onclick="location.href='https://www.elizium.nu/scripts/lemmings/'">
  <canvas></canvas><span>Lemmings</span>
</button>

<button class="liquid-btn" onclick="location.href='https://kazuki-4ys.github.io/web_apps/snes9x-2005-wasm/'">
  <canvas></canvas><span>SNES Emulator</span>
</button>

<button class="liquid-btn" onclick="location.href='https://www.supersmashflash.com/play/ssf1/'">
  <canvas></canvas><span>Super Smash Flash</span>
</button>

<button class="liquid-btn" onclick="location.href='https://kbhgames.com/game/super-smash-flash-2'">
  <canvas></canvas><span>Super Smash Flash 2</span>
</button>

</div>

<!-- =========================
WEBGL SHADER (YOUR VERSION ADAPTED)
========================= -->

<script id="fragShader" type="x-shader/x-fragment">
precision mediump float;

uniform vec2 iResolution;

float rounded(vec2 p){
  float r = 6.0;
  vec2 b = iResolution * 0.5;
  vec2 d = abs(p) - b + r;
  return min(max(d.x,d.y),0.0) + length(max(d,0.0)) - r;
}

void main(){
  vec2 uv = gl_FragCoord.xy;

  vec2 center = iResolution * 0.5;
  vec2 p = uv - center;

  float d = rounded(p);

  vec3 base = vec3(0.15,0.15,0.18);

  // glass interior
  if(d < 0.0){
    float glow = smoothstep(-40.0,0.0,d);

    vec3 col = base;

    // fake refraction gradient
    col += vec3(0.1,0.12,0.15) * glow;

    // highlight
    col += vec3(0.25) * smoothstep(-20.0,-5.0,d);

    gl_FragColor = vec4(col,1.0);
  }
  else{
    // shadow
    float shadow = exp(-d*d*0.002);
    gl_FragColor = vec4(0.0,0.0,0.0,shadow*0.5);
  }
}
</script>

<script>
function createGL(button){

  const canvas = button.querySelector("canvas");
  const gl = canvas.getContext("webgl");

  const vs = `
  attribute vec2 position;
  void main(){
    gl_Position = vec4(position,0.0,1.0);
  }`;

  const fs = document.getElementById("fragShader").textContent;

  function compile(type,src){
    const s = gl.createShader(type);
    gl.shaderSource(s,src);
    gl.compileShader(s);
    return s;
  }

  const prog = gl.createProgram();
  gl.attachShader(prog,compile(gl.VERTEX_SHADER,vs));
  gl.attachShader(prog,compile(gl.FRAGMENT_SHADER,fs));
  gl.linkProgram(prog);
  gl.useProgram(prog);

  const buf = gl.createBuffer();
  gl.bindBuffer(gl.ARRAY_BUFFER,buf);
  gl.bufferData(gl.ARRAY_BUFFER,new Float32Array([
    -1,-1,  1,-1,  -1,1,  1,1
  ]),gl.STATIC_DRAW);

  const loc = gl.getAttribLocation(prog,"position");
  gl.enableVertexAttribArray(loc);
  gl.vertexAttribPointer(loc,2,gl.FLOAT,false,0,0);

  const resLoc = gl.getUniformLocation(prog,"iResolution");

  function resize(){
    const r = button.getBoundingClientRect();
    canvas.width = r.width;
    canvas.height = r.height;
    gl.viewport(0,0,canvas.width,canvas.height);
  }

  window.addEventListener("resize",resize);
  resize();

  function draw(){
    gl.uniform2f(resLoc,canvas.width,canvas.height);
    gl.drawArrays(gl.TRIANGLE_STRIP,0,4);
    requestAnimationFrame(draw);
  }

  draw();
}

document.querySelectorAll(".liquid-btn")
.forEach(createGL);
</script>

</body>
</html>
