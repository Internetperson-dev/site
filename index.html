<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="A group of websites">
<title>Internetperson-dev Useful links</title>
<link rel="icon" type="image/png" href="favicon.png">

<link rel="stylesheet" href="styles.css" />
<link rel="stylesheet" href="glass.css" />

<style>
html, body {
  height: 100%;
  min-height: 500vh;
  margin: 0;
  font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI",
               Roboto, Helvetica, Arial, sans-serif;
  overflow-x: hidden;
  cursor: none;
  background: radial-gradient(circle at top left, #1f1f1f, #121212);
  color: #fff;
}

.glass-cursor {
  position: fixed;
  top: 0;
  left: 0;
  width: 2rem;
  height: 2rem;
  border-radius: 50%;
  transform: translate(-50%, -50%);
  pointer-events: none;
  z-index: 9999;
  background: rgba(255, 255, 255, 0.08);
  box-shadow:
    0 0 0 2px rgba(255, 255, 255, 0.6),
    0 16px 32px rgba(0, 0, 0, 0.12);
  backdrop-filter: blur(10px);
}

.links {
  display: flex;
  flex-direction: column;
  align-items: center;
  min-height: 100vh;
  padding: 40px;
  gap: 15px;
}

h1 {
  font-size: 2rem;
  margin-bottom: 20px;
}
</style>
</head>

<body>

<div class="glass-cursor"></div>

<div class="links">
  <h1>Useful Links</h1>

  <div id="etc-container"></div>
  <div id="content" style="display:none; flex-direction:column; gap:10px;"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
<script src="container.js"></script>
<script src="button.js"></script>

<script>
/* =========================
   CURSOR
========================= */
const cursor = document.querySelector('.glass-cursor');
document.addEventListener('mousemove', e => {
  cursor.style.left = e.clientX + 'px';
  cursor.style.top  = e.clientY + 'px';
});

/* =========================
   NAV HELPERS
========================= */
function go(url) {
  window.location.href = url;
}

function createLinkButton(text, url) {
  return new Button({
    text,
    size: 32,
    type: 'rounded',
    onClick: () => go(url)
  }).element;
}

/* =========================
   COLLAPSIBLE BUTTON
========================= */
const content = document.getElementById("content");

const toggleButton = new Button({
  text: "/etc",
  size: 34,
  type: "rounded",
  onClick: () => {
    content.style.display =
      content.style.display === "flex" ? "none" : "flex";
  }
});

document.getElementById("etc-container")
  .appendChild(toggleButton.element);

/* =========================
   LINKS (UI LIBRARY)
========================= */
const links = [
  ["3DS Games", "https://wolfyxon.github.io/3ds-web-stuff/"],
  ["3DS Games - 2", "http://froxot.de/"],
  ["Lemmings", "https://www.elizium.nu/scripts/lemmings/"],
  ["SNES Emu", "https://kazuki-4ys.github.io/web_apps/snes9x-2005-wasm/"],
  ["Super Smash Flash", "https://www.supersmashflash.com/play/ssf1/"],
  ["Super Smash Flash 2", "https://kbhgames.com/game/super-smash-flash-2"],
  ["Test Game", "https://internetperson-dev.github.io/site/platformer/title.html"],
  ["Angry Birds Chrome", "https://yell0wsuit.page/assets/games/angry-birds-chrome/index.html"],
  ["Music PWA Test", "https://kinoposts.web.app/test/playlistmaker.html"],
  ["Google Calculator PWA", "https://calculator.apps.chrome/"],
  ["yt-bad", "https://internetperson-dev.github.io/site/etc/yt/yt-bad.html"],
  ["yt-good", "https://internetperson-dev.github.io/site/etc/yt/yt-good.html"]
];

links.forEach(([name, url]) => {
  content.appendChild(createLinkButton(name, url));
});

/* =========================
   LADYBIRD EFFECT
========================= */
function createLadybird() {
  const e = document.createElement("div");
  e.className = "ladybird";
  e.innerText = "🐞";
  e.style.position = "absolute";
  e.style.left = Math.random() * window.innerWidth + "px";
  e.style.top = "0px";
  document.body.appendChild(e);
  setTimeout(() => e.remove(), 1000);
}

if (navigator.userAgent.includes("Ladybird")) {
  for (let i = 0; i < 10; i++) {
    setTimeout(createLadybird, 500 * Math.random());
  }
}
</script>

</body>
</html>
