<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="A group of websites">
<title>Internetperson-dev Useful links</title>
<link rel="icon" type="image/png" href="favicon.png">

<link rel="stylesheet" href="styles.css">
<link rel="stylesheet" href="glass.css">

<style>
html, body {
  height: 100%;
  margin: 0;
  font-family: system-ui, sans-serif;
  overflow-x: hidden;
  cursor: none;
  background: radial-gradient(circle at top left, #1f1f1f, #121212);
  color: white;
}

.glass-cursor {
  position: fixed;
  width: 2rem;
  height: 2rem;
  border-radius: 50%;
  transform: translate(-50%, -50%);
  pointer-events: none;
  z-index: 9999;
  background: rgba(255,255,255,0.08);
  backdrop-filter: blur(10px);
  box-shadow: 0 0 0 2px rgba(255,255,255,0.5);
}

.links {
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 40px;
  gap: 12px;
}

h1 {
  margin-bottom: 20px;
}
</style>
</head>

<body>

<div class="glass-cursor"></div>

<div class="links">
  <h1>Useful Links</h1>

  <div id="menu"></div>
  <div id="content" style="display:none; flex-direction:column; gap:10px;"></div>
</div>

<!-- REQUIRED LIBS -->
<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
<script src="container.js"></script>
<script src="button.js"></script>

<script>
/* =========================
   CURSOR
========================= */
const cursor = document.querySelector(".glass-cursor");
document.addEventListener("mousemove", e => {
  cursor.style.left = e.clientX + "px";
  cursor.style.top = e.clientY + "px";
});

/* =========================
   NAV HELPERS
========================= */
const go = (url) => window.location.href = url;

/* =========================
   COLLAPSIBLE CONTAINER
========================= */
const content = document.getElementById("content");

const toggleBtn = new Button({
  text: "/etc",
  size: 34,
  type: "rounded",
  onClick: () => {
    content.style.display =
      content.style.display === "flex" ? "none" : "flex";
  }
});

document.getElementById("menu").appendChild(toggleBtn.element);

/* =========================
   LIQUID GLASS BUTTONS
========================= */
const links = [
  ["3DS Games", "https://wolfyxon.github.io/3ds-web-stuff/"],
  ["3DS Games - 2", "http://froxot.de/"],
  ["Lemmings", "https://www.elizium.nu/scripts/lemmings/"],
  ["SNES Emu", "https://kazuki-4ys.github.io/web_apps/snes9x-2005-wasm/"],
  ["Super Smash Flash", "https://www.supersmashflash.com/play/ssf1/"],
  ["Super Smash Flash 2", "https://kbhgames.com/game/super-smash-flash-2"],
  ["Test Game", "https://internetperson-dev.github.io/site/platformer/title.html"],
  ["Angry Birds", "https://yell0wsuit.page/assets/games/angry-birds-chrome/index.html"],
  ["Music PWA", "https://kinoposts.web.app/test/playlistmaker.html"],
  ["Calculator", "https://calculator.apps.chrome/"],
  ["yt-bad", "https://internetperson-dev.github.io/site/etc/yt/yt-bad.html"],
  ["yt-good", "https://internetperson-dev.github.io/site/etc/yt/yt-good.html"]
];

links.forEach(([text, url]) => {
  const btn = new Button({
    text,
    size: 28,
    type: "rounded",
    onClick: () => go(url)
  });

  content.appendChild(btn.element);
});

/* =========================
   LADYBIRD EFFECT
========================= */
function spawnBug() {
  const e = document.createElement("div");
  e.innerText = "🐞";
  e.style.position = "absolute";
  e.style.left = Math.random() * window.innerWidth + "px";
  e.style.top = "0px";
  e.style.fontSize = "2rem";
  e.style.animation = "fall 3s linear forwards";
  document.body.appendChild(e);
  setTimeout(() => e.remove(), 3000);
}

if (navigator.userAgent.includes("Ladybird")) {
  for (let i = 0; i < 10; i++) {
    setTimeout(spawnBug, Math.random() * 1000);
  }
}
</script>

<style>
@keyframes fall {
  from { transform: translateY(-50px); opacity: 1; }
  to { transform: translateY(100vh); opacity: 0; }
}
</style>

</body>
</html>
