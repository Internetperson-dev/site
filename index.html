<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Internetperson-dev Useful links</title>

<link rel="icon" href="favicon.png">
<link rel="stylesheet" href="styles.css"/>
<link rel="stylesheet" href="glass.css"/>

  
<style>
html, body {
  height: 100%;
  margin: 0;
  font-family: system-ui, sans-serif;
  background: radial-gradient(circle at top left, #1f1f1f, #121212);
  color: white;
  overflow-x: hidden;
  cursor: none;
}

.glass-cursor {
  position: fixed;
  width: 2rem;
  height: 2rem;
  border-radius: 50%;
  transform: translate(-50%, -50%);
  pointer-events: none;
  z-index: 9999;
  background: rgba(255,255,255,0.08);
  backdrop-filter: blur(10px);
  box-shadow: 0 0 0 2px rgba(255,255,255,0.4);
}

.links {
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 40px;
  gap: 12px;
}
</style>
</head>

<body>

<div class="glass-cursor"></div>

<div class="links">
  <h1>Useful Links</h1>

  <div id="menu"></div>
  <div id="content" style="display:none; flex-direction:column; gap:10px;"></div>
</div>

<!-- REQUIRED DEPENDENCY -->
<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>

<!-- LIQUID GLASS JS (FROM GITHUB RAW) -->
<script src="https://raw.githubusercontent.com/dashersw/liquid-glass-js/refs/heads/main/container.js"></script>
<script src="https://raw.githubusercontent.com/dashersw/liquid-glass-js/refs/heads/main/button.js"></script>

<script>
const cursor = document.querySelector(".glass-cursor");

document.addEventListener("mousemove", e => {
  cursor.style.left = e.clientX + "px";
  cursor.style.top = e.clientY + "px";
});

const go = (url) => window.location.href = url;

/* TOGGLE */
const content = document.getElementById("content");

const toggleBtn = new Button({
  text: "/etc",
  size: 34,
  type: "rounded",
  onClick: () => {
    content.style.display =
      content.style.display === "flex" ? "none" : "flex";
  }
});

document.getElementById("menu").appendChild(toggleBtn.element);

/* LINKS */
const links = [
  ["3DS Games", "https://wolfyxon.github.io/3ds-web-stuff/"],
  ["Lemmings", "https://www.elizium.nu/scripts/lemmings/"],
  ["SNES Emu", "https://kazuki-4ys.github.io/web_apps/snes9x-2005-wasm/"],
  ["Super Smash Flash", "https://www.supersmashflash.com/play/ssf1/"],
  ["Super Smash Flash 2", "https://kbhgames.com/game/super-smash-flash-2"]
];

links.forEach(([text, url]) => {
  const btn = new Button({
    text,
    size: 28,
    type: "rounded",
    onClick: () => go(url)
  });

  content.appendChild(btn.element);
});
</script>

</body>
</html>
