name: Build & Deploy Liquid Glass Demos

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # ---------------- CHECKOUT SITE ----------------
      - name: Checkout site repo
        uses: actions/checkout@v4
        with:
          path: site
          fetch-depth: 0

      # ---------------- CHECKOUT FLUTTER SOURCE ----------------
      - name: Checkout Flutter source
        uses: actions/checkout@v4
        with:
          repository: sdegenaar/liquid_glass_widgets
          path: flutter_src
          fetch-depth: 0

      # ---------------- FLUTTER SETUP ----------------
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.9'
          cache: true
    
      # ---------------- PUB CACHE ----------------
      - name: Cache pub dependencies
        uses: actions/cache@v4
        with:
          path: ~/.pub-cache
          key: ${{ runner.os }}-pub-${{ hashFiles('**/pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-pub-

      # ---------------- ENABLE WEB ----------------
      - name: Enable Flutter web
        run: flutter config --enable-web

      # ---------------- ENSURE WEB SUPPORT ----------------
      - name: Ensure web support exists
        run: |
          cd flutter_src/example
          if [ ! -d "web" ]; then
            flutter create . --platforms=web
          fi

      # ---------------- DEPENDENCIES ----------------
      - name: Get dependencies
        run: |
          cd flutter_src/example
          flutter pub get

      # ---------------- BUILD APP 1: APPLE MUSIC ----------------
      - name: Build Apple Music
        run: |
          cd flutter_src/example
      
          flutter build web \
            -t lib/apple_music/apple_music_demo.dart \
            --release \
            --base-href /liquid_glass_widgets/apple_music/
      
          rm -rf ../../site/liquid_glass_widgets/apple_music
          mkdir -p ../../site/liquid_glass_widgets/apple_music
          cp -r build/web/* ../../site/liquid_glass_widgets/apple_music/
      
      # ---------------- BUILD APP 2: APPLE PODCASTS ----------------
      - name: Build Apple Podcasts
        run: |
          cd flutter_src/example
      
          flutter build web \
            -t lib/apple_podcasts/apple_podcasts_demo.dart \
            --release \
            --base-href /liquid_glass_widgets/apple_podcasts/
      
          rm -rf ../../site/liquid_glass_widgets/apple_podcasts
          mkdir -p ../../site/liquid_glass_widgets/apple_podcasts
          cp -r build/web/* ../../site/liquid_glass_widgets/apple_podcasts/

        # ---------------- BUILD APP 3: APPLE MESSAGES ----------------
      - name: Build Apple Podcasts
        run: |
          cd flutter_src/example
      
          flutter build web \
            -t lib/apple_messages/apple_messages_demo.dart \
            --release \
            --base-href /liquid_glass_widgets/apple_messages/
      
          rm -rf ../../site/liquid_glass_widgets/apple_messages
          mkdir -p ../../site/liquid_glass_widgets/apple_messages
          cp -r build/web/* ../../site/liquid_glass_widgets/apple_messages/


        # ---------------- BUILD APP 4: APPLE NEWS ----------------
      - name: Build Apple Podcasts
        run: |
          cd flutter_src/example
      
          flutter build web \
            -t lib/apple_news/apple_news_demo.dart \
            --release \
            --base-href /liquid_glass_widgets/apple_news/
      
          rm -rf ../../site/liquid_glass_widgets/apple_news
          mkdir -p ../../site/liquid_glass_widgets/apple_news
          cp -r build/web/* ../../site/liquid_glass_widgets/apple_news/

    
      # ---------------- COMMIT + PUSH ----------------
      - name: Commit and push changes
        run: |
          cd site
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add liquid_glass_widgets

          git diff --cached --quiet && echo "No changes" && exit 0

          git commit -m "Update Flutter web builds"
          git push https://x-access-token:${{ secrets.GH_PAT }}@github.com/Internetperson-dev/site.git main
