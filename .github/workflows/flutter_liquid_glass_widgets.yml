name: Build & Deploy Liquid Glass Demos

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: flutter-liquid-glass-build
  cancel-in-progress: true

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        app:
          - name: apple_music
            entry: lib/apple_music/apple_music_demo.dart
          - name: apple_podcasts
            entry: lib/apple_podcasts/apple_podcasts_demo.dart
          - name: apple_messages
            entry: lib/apple_messages/apple_messages_demo.dart
          - name: apple_news
            entry: lib/apple_news/apple_news_demo.dart

    steps:
      - name: Checkout Flutter source
        uses: actions/checkout@v4
        with:
          repository: sdegenaar/liquid_glass_widgets
          path: flutter_src

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.9'
          cache: true

      - name: Enable web
        run: flutter config --enable-web

      - name: Get dependencies
        run: |
          cd flutter_src/example
          flutter pub get

      # ---------------- BUILD BOTH VERSIONS ----------------
      - name: Build app (web + wasm)
        run: |
          cd flutter_src/example

          APP_NAME=${{ matrix.app.name }}
          ENTRY_FILE=${{ matrix.app.entry }}

          BASE="/liquid_glass_widgets"

          echo "Building $APP_NAME"

          # WEB
          flutter build web \
            -t "$ENTRY_FILE" \
            --release \
            --base-href "$BASE/$APP_NAME/"

          mkdir -p ../../site/$APP_NAME
          rm -rf ../../site/$APP_NAME
          cp -r build/web ../../site/$APP_NAME

          # WASM
          flutter build web \
            -t "$ENTRY_FILE" \
            --release \
            --wasm \
            --base-href "$BASE/${APP_NAME}_wasm/"

          mkdir -p ../../site/${APP_NAME}_wasm
          rm -rf ../../site/${APP_NAME}_wasm
          cp -r build/web ../../site/${APP_NAME}_wasm

      # ---------------- UPLOAD ARTIFACT PER MATRIX ----------------
      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: site-${{ matrix.app.name }}
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest

    environment:
      name: github-pages

    steps:
      # ---------------- DOWNLOAD ALL ARTIFACTS ----------------
      - name: Download all builds
        uses: actions/download-artifact@v4
        with:
          path: site

      # flatten structure
      - name: Merge artifacts
        run: |
          mkdir -p public
          cp -r site/*/* public/

      # ---------------- DEPLOY ONCE ----------------
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
