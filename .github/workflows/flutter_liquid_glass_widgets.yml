name: Build & Deploy Liquid Glass Demos

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # ---------------- CHECKOUT SITE ----------------
      - name: Checkout site repo
        uses: actions/checkout@v4
        with:
          path: site
          fetch-depth: 0

      # ---------------- CHECKOUT FLUTTER SOURCE ----------------
      - name: Checkout Flutter source
        uses: actions/checkout@v4
        with:
          repository: sdegenaar/liquid_glass_widgets
          path: flutter_src
          fetch-depth: 0

      # ---------------- FLUTTER SETUP ----------------
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Enable Flutter web
        run: flutter config --enable-web

      # ---------------- ENSURE WEB SUPPORT ----------------
      - name: Ensure web support exists
        run: |
          cd flutter_src/example
          if [ ! -d "web" ]; then
            flutter create . --platforms=web
          fi

      # ---------------- DEPENDENCIES ----------------
      - name: Get dependencies
        run: |
          cd flutter_src/example
          flutter pub get

      # ---------------- BUILD ----------------
      - name: Build Apple Music
        run: |
          cd flutter_src/example
          flutter build web \
            -t lib/apple_music/apple_music_demo.dart \
            --release \
            --base-href /liquid_glass_widgets/apple_music/ \
            --output build/apple_music

      - name: Build Apple Podcasts
        run: |
          cd flutter_src/example
          flutter build web \
            -t lib/apple_podcasts/apple_podcasts_demo.dart \
            --release \
            --base-href /liquid_glass_widgets/apple_podcasts/ \
            --output build/apple_podcasts

      # ---------------- COPY INTO REPO ----------------
      - name: Copy builds into repo folder
        run: |
          rm -rf flutter_src/liquid_glass_widgets
          mkdir -p flutter_src/liquid_glass_widgets

          cp -r flutter_src/example/build/apple_music flutter_src/liquid_glass_widgets/
          cp -r flutter_src/example/build/apple_podcasts flutter_src/liquid_glass_widgets/

      # ---------------- COMMIT & PUSH ----------------
      - name: Commit build output
        run: |
          cd flutter_src

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add liquid_glass_widgets

          # Only commit if there are changes
          git diff --cached --quiet && echo "No changes to commit" && exit 0

          git commit -m "Update Flutter web builds"
          git push origin main
