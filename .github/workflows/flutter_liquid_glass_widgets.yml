name: Build & Deploy Liquid Glass Demos

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # ---------------- CHECKOUT SITE ----------------
      - name: Checkout site repo
        uses: actions/checkout@v4
        with:
          path: site
          fetch-depth: 0

      # ---------------- CHECKOUT FLUTTER SOURCE ----------------
      - name: Checkout Flutter source
        uses: actions/checkout@v4
        with:
          repository: sdegenaar/liquid_glass_widgets
          path: flutter_src
          fetch-depth: 0

      # ---------------- FLUTTER SETUP ----------------
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      # ---------------- PUB CACHE ----------------
      - name: Cache pub dependencies
        uses: actions/cache@v4
        with:
          path: ~/.pub-cache
          key: ${{ runner.os }}-pub-${{ hashFiles('**/pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-pub-

      # ---------------- FLUTTER BUILD CACHE ----------------
      - name: Cache Flutter build
        uses: actions/cache@v4
        with:
          path: flutter_src/example/build
          key: ${{ runner.os }}-flutter-build-${{ github.sha }}

      - name: Enable Flutter web
        run: flutter config --enable-web

      # ---------------- ENSURE WEB SUPPORT ----------------
      - name: Ensure web support exists
        run: |
          cd flutter_src/example
          if [ ! -d "web" ]; then
            flutter create . --platforms=web
          fi

      # ---------------- DEPENDENCIES ----------------
      - name: Get dependencies
        run: |
          cd flutter_src/example
          flutter pub get

      # ---------------- BUILD ----------------
      - name: Build Apple Music
        run: |
          cd flutter_src/example
          flutter build web \
            -t lib/apple_music/apple_music_demo.dart \
            --release \
            --base-href /liquid_glass_widgets/apple_music/ \
            --output build/apple_music

      - name: Build Apple Podcasts
        run: |
          cd flutter_src/example
          flutter build web \
            -t lib/apple_podcasts/apple_podcasts_demo.dart \
            --release \
            --base-href /liquid_glass_widgets/apple_podcasts/ \
            --output build/apple_podcasts

      # ---------------- COPY INTO SITE REPO ----------------
      - name: Copy builds into site repo
        run: |
          rm -rf site/liquid_glass_widgets
          mkdir -p site/liquid_glass_widgets

          cp -r flutter_src/example/build/apple_music site/liquid_glass_widgets/
          cp -r flutter_src/example/build/apple_podcasts site/liquid_glass_widgets/

      # ---------------- COMMIT + PUSH (FIXED TARGET REPO) ----------------
      - name: Commit and push changes
        run: |
          cd site

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add liquid_glass_widgets

          git diff --cached --quiet && echo "No changes" && exit 0

          git commit -m "Update Flutter web builds"

          git push https://x-access-token:${{ secrets.GH_PAT }}@github.com/Internetperson-dev/site.git main
