name: Deploy Liquid Glass Website

on:
  workflow_dispatch:
  schedule:
    - cron: "0 0 * * *"
  push:
    branches: [main]

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout website repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install GitHub CLI
        run: |
          sudo apt-get update
          sudo apt-get install -y gh

      - name: Clean old builds
        run: |
          rm -rf liquid_glass_widgets
          mkdir -p liquid_glass_widgets

      - name: Get latest release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG=$(gh release list \
            -R Internetperson-dev/liquid_glass_widgets \
            --limit 1 \
            --json tagName \
            -q '.[0].tagName')

          echo "Latest tag: $TAG"

          gh release download "$TAG" \
            -R Internetperson-dev/liquid_glass_widgets \
            --pattern "web-builds.tar.gz" \
            --pattern "wasm-builds.tar.gz"

      - name: Extract web builds
        run: |
          mkdir -p web_extract
          tar -xzf web-builds.tar.gz -C web_extract

      - name: Extract wasm builds
        run: |
          mkdir -p wasm_extract
          tar -xzf wasm-builds.tar.gz -C wasm_extract

      - name: Debug structure
        run: |
          echo "==== WEB ===="
          find web_extract -maxdepth 3 -type f -o -type d

          echo "==== WASM ===="
          find wasm_extract -maxdepth 3 -type f -o -type d

      - name: Build widget structure (FIXED LOGIC)
        run: |
          set -e

          WIDGETS=("apple_music" "apple_news" "apple_podcasts")

          # Detect if we actually have widget folders
          if [ -d "web_extract/web/apple_music" ]; then
            echo "Multi-widget build detected (good)"
            for w in "${WIDGETS[@]}"; do
              if [ -d "web_extract/web/$w" ]; then
                mkdir -p "liquid_glass_widgets/$w"
                cp -a "web_extract/web/$w/." "liquid_glass_widgets/$w/"
              fi
            done
          else
            echo "Single build detected → replicating into widget folders"

            for w in "${WIDGETS[@]}"; do
              mkdir -p "liquid_glass_widgets/$w"
              cp -a web_extract/web/. "liquid_glass_widgets/$w/"
            done
          fi

      - name: Build wasm structure (same logic)
        run: |
          set -e

          WIDGETS=("apple_music" "apple_news" "apple_podcasts")

          if [ -d "wasm_extract/wasm/apple_music" ]; then
            for w in "${WIDGETS[@]}"; do
              if [ -d "wasm_extract/wasm/$w" ]; then
                rm -rf "liquid_glass_widgets/$w"
                mkdir -p "liquid_glass_widgets/$w"
                cp -a "wasm_extract/wasm/$w/." "liquid_glass_widgets/$w/"
              fi
            done
          else
            echo "Single wasm build → mirroring into widgets"
            for w in "${WIDGETS[@]}"; do
              rm -rf "liquid_glass_widgets/$w"
              mkdir -p "liquid_glass_widgets/$w"
              cp -a wasm_extract/wasm/. "liquid_glass_widgets/$w/"
            done
          fi

      - name: Commit updated builds
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add liquid_glass_widgets

          if git diff --cached --quiet; then
            echo "No changes"
          else
            git commit -m "Update Flutter web builds"
            git push
          fi

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

  deploy:
    needs: build
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
