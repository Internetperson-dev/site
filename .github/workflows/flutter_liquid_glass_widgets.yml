name: Deploy Liquid Glass Website

on:
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout website repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Prepare directories
        run: |
          rm -rf site/liquid_glass_widgets
          mkdir -p site/liquid_glass_widgets

      - name: Download release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release download build-22 \
            --repo Internetperson-dev/liquid_glass_widgets \
            --pattern "web-builds.tar.gz" \
            --pattern "wasm-builds.tar.gz"

      - name: Extract web builds
        run: |
          mkdir web_extract
          tar -xzf web-builds.tar.gz -C web_extract

      - name: Extract wasm builds
        run: |
          mkdir wasm_extract
          tar -xzf wasm-builds.tar.gz -C wasm_extract

      - name: Move web builds into final structure
        run: |
          for dir in web_extract/*; do
            name=$(basename "$dir")
            mv "$dir" "site/liquid_glass_widgets/$name"
          done

      - name: Move wasm builds into final structure
        run: |
          for dir in wasm_extract/*; do
            name=$(basename "$dir")
            mv "$dir" "site/liquid_glass_widgets/${name}_wasm"
          done

      - name: Commit updated builds
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add site/liquid_glass_widgets

          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update Flutter web builds"
            git push
          fi

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
