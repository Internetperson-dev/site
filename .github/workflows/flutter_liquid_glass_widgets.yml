name: Build & Deploy Liquid Glass Demos

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

env:
  REPO_NAME: liquid_glass_widgets  # IMPORTANT: change if your repo name differs

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # ---------------- CHECKOUT SITE ----------------
      - name: Checkout site repo
        uses: actions/checkout@v4
        with:
          path: site

      # ---------------- CHECKOUT SOURCE ----------------
      - name: Checkout liquid_glass_widgets
        uses: actions/checkout@v4
        with:
          repository: sdegenaar/liquid_glass_widgets
          path: liquid_glass_widgets

      # ---------------- FLUTTER SETUP ----------------
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Enable web
        run: flutter config --enable-web

      # ---------------- PREP ----------------
      - name: Ensure web support
        run: |
          cd liquid_glass_widgets/example
          flutter create . --platforms=web

      - name: Get dependencies
        run: |
          cd liquid_glass_widgets/example
          flutter pub get

      # ---------------- BUILD DEMOS ----------------

      - name: Build Apple Music
        run: |
          cd liquid_glass_widgets/example
          flutter build web \
            -t lib/apple_music/apple_music_demo.dart \
            --release \
            --base-href /${{ env.REPO_NAME }}/apple_music/ \
            --output build/apple_music

      - name: Build Apple Podcasts
        run: |
          cd liquid_glass_widgets/example
          flutter build web \
            -t lib/apple_podcasts/apple_podcasts_demo.dart \
            --release \
            --base-href /${{ env.REPO_NAME }}/apple_podcasts/ \
            --output build/apple_podcasts

      # ---------------- PREP PUBLIC FOLDER ----------------

      - name: Create merged public folder
        run: |
          rm -rf public
          mkdir -p public

          # Copy static site
          cp -r site/* public/

          # Ensure clean demo folders
          rm -rf public/apple_music public/apple_podcasts

          # Copy Flutter builds
          cp -r liquid_glass_widgets/example/build/apple_music public/
          cp -r liquid_glass_widgets/example/build/apple_podcasts public/

      # ---------------- UPLOAD ARTIFACT ----------------

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

  deploy:
    needs: build
    runs-on: ubuntu-latest

    environment:
      name: github-pages

    steps:
      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
