name: Build & Deploy Liquid Glass Demos

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        app:
          - name: apple_music
            entry: lib/apple_music/apple_music_demo.dart
          - name: apple_podcasts
            entry: lib/apple_podcasts/apple_podcasts_demo.dart
          - name: apple_messages
            entry: lib/apple_messages/apple_messages_demo.dart
          - name: apple_news
            entry: lib/apple_news/apple_news_demo.dart

    steps:
      # ---------------- CHECKOUT SITE ----------------
      - name: Checkout site repo
        uses: actions/checkout@v4
        with:
          path: site
          fetch-depth: 0

      # ---------------- CHECKOUT FLUTTER SOURCE ----------------
      - name: Checkout Flutter source
        uses: actions/checkout@v4
        with:
          repository: sdegenaar/liquid_glass_widgets
          path: flutter_src
          fetch-depth: 0

      # ---------------- FLUTTER SETUP ----------------
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.9'
          cache: true

      # ---------------- PUB CACHE ----------------
      - name: Cache pub dependencies
        uses: actions/cache@v4
        with:
          path: ~/.pub-cache
          key: ${{ runner.os }}-pub-${{ hashFiles('**/pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-pub-

      # ---------------- ENABLE WEB ----------------
      - name: Enable Flutter web
        run: flutter config --enable-web

      # ---------------- ENSURE WEB SUPPORT ----------------
      - name: Ensure web support exists
        run: |
          cd flutter_src/example

          if [ ! -d "web" ]; then
            flutter create . --platforms=web
          fi

      # ---------------- DEPENDENCIES ----------------
      - name: Get dependencies
        run: |
          cd flutter_src/example
          flutter pub get

      # ---------------- BUILD WEB APP (MATRIX) ----------------
      - name: Build Flutter Web App
        run: |
          cd flutter_src/example

          APP_NAME=${{ matrix.app.name }}
          ENTRY_FILE=${{ matrix.app.entry }}
          BASE_PATH="/site/liquid_glass_widgets"

          echo "Building WEB for $APP_NAME"

          flutter build web \
            -t "$ENTRY_FILE" \
            --release \
            --base-href "$BASE_PATH/$APP_NAME/"

          DEST="../../site/liquid_glass_widgets/$APP_NAME"

          rm -rf "$DEST"
          mkdir -p "$DEST"

          cp -r build/web/* "$DEST/"

      # ---------------- BUILD WASM APP (MATRIX) ----------------
      - name: Build Flutter WASM App
        run: |
          cd flutter_src/example

          APP_NAME=${{ matrix.app.name }}
          ENTRY_FILE=${{ matrix.app.entry }}
          BASE_PATH="/site/liquid_glass_widgets"

          echo "Building WASM for $APP_NAME"

          flutter build wasm \
            -t "$ENTRY_FILE" \
            --release \
            --base-href "$BASE_PATH/${APP_NAME}_wasm/"

          DEST="../../site/liquid_glass_widgets/${APP_NAME}_wasm"

          rm -rf "$DEST"
          mkdir -p "$DEST"

          cp -r build/web/* "$DEST/"

      # ---------------- COMMIT + PUSH ----------------
      - name: Commit and push changes
        run: |
          cd site

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add liquid_glass_widgets

          if git diff --cached --quiet; then
            echo "No changes"
            exit 0
          fi

          git commit -m "Deploy Liquid Glass demos"

          git push
