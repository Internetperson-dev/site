name: Deploy Liquid Glass Website

on:
  workflow_dispatch:
  schedule:
    - cron: "0 0 * * *"  # daily at 00:00 UTC
  push:
    branches: [main]

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout website repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Clean old builds
        run: |
          rm -rf liquid_glass_widgets
          mkdir -p liquid_glass_widgets

      - name: Get latest release tag and download assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG=$(gh release list \
            -R Internetperson-dev/liquid_glass_widgets \
            --limit 1 \
            --json tagName \
            -q '.[0].tagName')
      
          echo "Latest tag: $TAG"
      
          gh release download "$TAG" \
            -R Internetperson-dev/liquid_glass_widgets \
            --pattern "web-builds.tar.gz" \
            --pattern "wasm-builds.tar.gz"
      
      - name: Extract web builds
        run: |
          mkdir -p web_extract
          tar -xzf web-builds.tar.gz -C web_extract


      - name: Extract wasm builds
        run: |
          mkdir -p wasm_extract
          tar -xzf wasm-builds.tar.gz -C wasm_extract

      - name: Move web builds into final structure
        run: |
          for dir in web_extract/web/*; do
            name=$(basename "$dir")
            mv "$dir" "liquid_glass_widgets/$name"
          done

      - name: Move wasm builds into final structure
        run: |
          for dir in wasm_extract/wasm/*; do
            name=$(basename "$dir")
            mv "$dir" "liquid_glass_widgets/$name"
          done

      - name: Commit updated builds
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add liquid_glass_widgets
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update Flutter web builds"
            git push
          fi

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

  deploy:
    needs: build
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
