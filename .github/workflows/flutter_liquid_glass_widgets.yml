name: Build & Deploy Liquid Glass Demos

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # ---------------- CHECKOUT SITE ----------------
      - name: Checkout site repo
        uses: actions/checkout@v4
        with:
          path: site
          fetch-depth: 0

      # ---------------- CHECKOUT FLUTTER SOURCE (WITH PAT) ----------------
      - name: Checkout Flutter source repo
        uses: actions/checkout@v4
        with:
          repository: sdegenaar/liquid_glass_widgets
          path: flutter_src
          fetch-depth: 0
          token: ${{ secrets.GH_PAT }}

      # ---------------- FLUTTER SETUP ----------------
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Enable Flutter web
        run: flutter config --enable-web

      # ---------------- ENSURE WEB SUPPORT ----------------
      - name: Ensure web support exists
        run: |
          cd flutter_src/example
          if [ ! -d "web" ]; then
            flutter create . --platforms=web
          fi

      # ---------------- DEPENDENCIES ----------------
      - name: Get dependencies
        run: |
          cd flutter_src/example
          flutter pub get

      # ---------------- BUILD ----------------
      - name: Build Apple Music
        run: |
          cd flutter_src/example
          flutter build web \
            -t lib/apple_music/apple_music_demo.dart \
            --release \
            --base-href /liquid_glass_widgets/apple_music/ \
            --output build/apple_music

      - name: Build Apple Podcasts
        run: |
          cd flutter_src/example
          flutter build web \
            -t lib/apple_podcasts/apple_podcasts_demo.dart \
            --release \
            --base-href /liquid_glass_widgets/apple_podcasts/ \
            --output build/apple_podcasts

      # ---------------- COPY INTO REPO ----------------
      - name: Copy builds into repo folder
        run: |
          rm -rf flutter_src/liquid_glass_widgets
          mkdir -p flutter_src/liquid_glass_widgets

          cp -r flutter_src/example/build/apple_music flutter_src/liquid_glass_widgets/
          cp -r flutter_src/example/build/apple_podcasts flutter_src/liquid_glass_widgets/

      # ---------------- COMMIT & PUSH (USING PAT) ----------------
      - name: Commit and push builds
        run: |
          cd flutter_src
      
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
      
          git add liquid_glass_widgets
      
          git diff --cached --quiet && echo "No changes" && exit 0
      
          git commit -m "Update Flutter web builds"
      
          # 🔥 CRITICAL: remove GitHub Actions default auth
          git config --global --unset-all http.https://github.com/.extraheader || true
      
          # 🔥 inject PAT properly
          git remote set-url origin https://github.com/sdegenaar/liquid_glass_widgets.git
      
          git push https://x-access-token:${{ secrets.GH_PAT }}@github.com/sdegenaar/liquid_glass_widgets.git main
