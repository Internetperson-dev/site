name: Build & Deploy Liquid Glass Demos

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        app:
          - name: apple_music
            entry: lib/apple_music/apple_music_demo.dart
          - name: apple_podcasts
            entry: lib/apple_podcasts/apple_podcasts_demo.dart
          - name: apple_messages
            entry: lib/apple_messages/apple_messages_demo.dart
          - name: apple_news
            entry: lib/apple_news/apple_news_demo.dart

    steps:
      # ---------------- CHECKOUT SITE ----------------
      - name: Checkout site repo
        uses: actions/checkout@v4
        with:
          path: site
          fetch-depth: 0

      # ---------------- CHECKOUT FLUTTER SOURCE ----------------
      - name: Checkout Flutter source
        uses: actions/checkout@v4
        with:
          repository: sdegenaar/liquid_glass_widgets
          path: flutter_src
          fetch-depth: 0

      # ---------------- FLUTTER SETUP ----------------
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.9'
          cache: true

      # ---------------- PUB CACHE ----------------
      - name: Cache pub dependencies
        uses: actions/cache@v4
        with:
          path: ~/.pub-cache
          key: ${{ runner.os }}-pub-${{ hashFiles('**/pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-pub-

      # ---------------- ENABLE WEB ----------------
      - name: Enable Flutter web
        run: flutter config --enable-web

      # ---------------- ENSURE WEB SUPPORT ----------------
      - name: Ensure web support exists
        run: |
          cd flutter_src/example
          if [ ! -d "web" ]; then
            flutter create . --platforms=web
          fi

      # ---------------- DEPENDENCIES ----------------
      - name: Get dependencies
        run: |
          cd flutter_src/example
          flutter pub get

      # ---------------- BUILD APP 1: APPLE MUSIC ----------------
      # ---------------- BUILD APP 2: APPLE PODCASTS ----------------
      # ---------------- BUILD APP 3: APPLE MESSAGES ----------------
      # - Broken on Flutter 3.44.0, works on 3.41.9
      # ---------------- BUILD APP 4: APPLE NEWS ----------------
      # - Broken on Flutter 3.44.0, works on 3.41.9
      - name: Build Apps (Matrix)
        run: |
          cd flutter_src/example

          APP_NAME=${{ matrix.app.name }}
          ENTRY_FILE=${{ matrix.app.entry }}

          BASE_PATH="/site/liquid_glass_widgets"

          echo "Building $APP_NAME"

          flutter build web \
            -t "$ENTRY_FILE" \
            --release \
            --base-href "$BASE_PATH/$APP_NAME/"

          DEST="../../site/liquid_glass_widgets/$APP_NAME"

          rm -rf "$DEST"
          mkdir -p "$DEST"
          cp -r build/web/* "$DEST/"

      # ---------------- COMMIT + PUSH ----------------
      - name: Commit and push changes
        run: |
          cd site
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add liquid_glass_widgets

          git diff --cached --quiet && echo "No changes" && exit 0

          git commit -m "Update Flutter web builds"
          git push https://x-access-token:${{ secrets.GH_PAT }}@github.com/Internetperson-dev/site.git main
