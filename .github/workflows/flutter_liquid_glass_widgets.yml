name: Build & Deploy Liquid Glass Demos

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

env:
  REPO_NAME: liquid_glass_widgets

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # ---------------- CHECKOUT REPO ----------------
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          path: liquid_glass_widgets

      # ---------------- CHECKOUT FLUTTER SOURCE ----------------
      - name: Checkout flutter widgets source
        uses: actions/checkout@v4
        with:
          repository: sdegenaar/liquid_glass_widgets
          path: liquid_glass_widgets/src

      # ---------------- FLUTTER SETUP ----------------
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Enable web
        run: flutter config --enable-web

      # ---------------- PREP ----------------
      - name: Ensure web support
        run: |
          cd liquid_glass_widgets/src/example
          flutter create . --platforms=web

      - name: Get dependencies
        run: |
          cd liquid_glass_widgets/src/example
          flutter pub get

      # ---------------- BUILD DEMOS ----------------

      - name: Build Apple Music
        run: |
          cd liquid_glass_widgets/src/example
          flutter build web \
            -t lib/apple_music/apple_music_demo.dart \
            --release \
            --base-href /${{ env.REPO_NAME }}/apple_music/ \
            --output build/apple_music

      - name: Build Apple Podcasts
        run: |
          cd liquid_glass_widgets/src/example
          flutter build web \
            -t lib/apple_podcasts/apple_podcasts_demo.dart \
            --release \
            --base-href /${{ env.REPO_NAME }}/apple_podcasts/ \
            --output build/apple_podcasts

      # ---------------- BUILD PUBLIC SITE ----------------

      - name: Create public folder
        run: |
          rm -rf liquid_glass_widgets/public
          mkdir -p liquid_glass_widgets/public

          # copy static site (if exists)
          if [ -d "liquid_glass_widgets/site" ]; then
            cp -r liquid_glass_widgets/site/* liquid_glass_widgets/public/
          fi

          # clean demo folders
          rm -rf liquid_glass_widgets/public/apple_music liquid_glass_widgets/public/apple_podcasts

          # copy flutter builds
          cp -r liquid_glass_widgets/src/example/build/apple_music liquid_glass_widgets/public/
          cp -r liquid_glass_widgets/src/example/build/apple_podcasts liquid_glass_widgets/public/

      # ---------------- UPLOAD ARTIFACT ----------------

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: liquid_glass_widgets/public

  deploy:
    needs: build
    runs-on: ubuntu-latest

    environment:
      name: github-pages

    steps:
      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
