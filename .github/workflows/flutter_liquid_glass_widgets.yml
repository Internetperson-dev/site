name: Build & Deploy Flutter Web Demos

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: example

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Enable web
        run: flutter config --enable-web

      - name: Get dependencies
        run: flutter pub get

      # ---------- BUILD OUTPUT ROOT ----------
      - name: Prepare build folder
        run: mkdir -p ../build

      # ---------- APPLE MUSIC ----------
      - name: Build Apple Music
        run: |
          flutter build web \
            -t lib/apple_music/apple_music_demo.dart \
            --release \
            --web-renderer canvaskit \
            --base-href /liquid_glass_widgets/apple_music/ \
            --output ../build/apple_music

      # ---------- APPLE MESSAGES ----------
      - name: Build Apple Messages
        run: |
          flutter build web \
            -t lib/apple_messages/apple_messages_demo.dart \
            --release \
            --web-renderer canvaskit \
            --base-href /liquid_glass_widgets/apple_messages/ \
            --output ../build/apple_messages

      # ---------- APPLE NEWS ----------
      - name: Build Apple News
        run: |
          flutter build web \
            -t lib/apple_news/apple_news_demo.dart \
            --release \
            --web-renderer canvaskit \
            --base-href /liquid_glass_widgets/apple_news/ \
            --output ../build/apple_news

      # ---------- APPLE PODCASTS ----------
      - name: Build Apple Podcasts
        run: |
          flutter build web \
            -t lib/apple_podcasts/apple_podcasts_demo.dart \
            --release \
            --web-renderer canvaskit \
            --base-href /liquid_glass_widgets/apple_podcasts/ \
            --output ../build/apple_podcasts

      # ---------- SHOWCASE ----------
      - name: Build Showcase
        run: |
          flutter build web \
            -t showcase/lib/main.dart \
            --release \
            --web-renderer canvaskit \
            --base-href /liquid_glass_widgets/showcase/ \
            --output ../build/showcase

      # ---------- PACKAGE FOR GITHUB PAGES ----------
      - name: Prepare docs folder
        run: |
          rm -rf ../docs
          mkdir -p ../docs
          cp -r ../build/* ../docs/

      - name: Add index page
        run: |
          cat <<EOF > ../docs/index.html
          <html>
            <head>
              <meta http-equiv="refresh" content="0; url=./showcase/" />
            </head>
            <body>
              Redirecting to showcase...
            </body>
          </html>
          EOF

      # ---------- DEPLOY ----------
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs
