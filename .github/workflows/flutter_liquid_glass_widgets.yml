name: Build & Deploy Liquid Glass Demos

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # ---------------- CHECKOUT ----------------
      - name: Checkout repo
        uses: actions/checkout@v4

      # ---------------- FLUTTER ----------------
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Enable web
        run: flutter config --enable-web

      # ---------------- PREP PROJECT ----------------
      - name: Ensure Flutter web support exists
        run: |
          cd liquid_glass_widgets/example
          flutter create . --platforms=web

      - name: Get dependencies
        run: |
          cd liquid_glass_widgets/example
          flutter pub get

      # ---------------- BUILD OUTPUT ----------------
      - name: Prepare output folders
        run: |
          rm -rf build docs
          mkdir -p build docs

      # ---------------- BUILD DEMOS ----------------

      - name: Build Apple Music
        run: |
          cd liquid_glass_widgets/example
          flutter build web \
            -t lib/apple_music/apple_music_demo.dart \
            --release \
            --base-href /site/apple_music/ \
            --output ../../build/apple_music

      - name: Build Apple Messages
        run: |
          cd liquid_glass_widgets/example
          flutter build web \
            -t lib/apple_messages/apple_messages_demo.dart \
            --release \
            --base-href /site/apple_messages/ \
            --output ../../build/apple_messages

      - name: Build Apple News
        run: |
          cd liquid_glass_widgets/example
          flutter build web \
            -t lib/apple_news/apple_news_demo.dart \
            --release \
            --base-href /site/apple_news/ \
            --output ../../build/apple_news

      - name: Build Apple Podcasts
        run: |
          cd liquid_glass_widgets/example
          flutter build web \
            -t lib/apple_podcasts/apple_podcasts_demo.dart \
            --release \
            --base-href /site/apple_podcasts/ \
            --output ../../build/apple_podcasts

      - name: Build Showcase
        run: |
          cd liquid_glass_widgets/example
          flutter build web \
            -t lib/showcase/main.dart \
            --release \
            --base-href /site/showcase/ \
            --output ../../build/showcase

      # ---------------- PACKAGE ----------------

      - name: Copy builds to docs
        run: cp -r build/* docs/

      - name: Add landing page
        run: |
          cat <<EOF > docs/index.html
          <html>
            <head>
              <meta http-equiv="refresh" content="0; url=./showcase/" />
            </head>
            <body>
              Redirecting to showcase...
            </body>
          </html>
          EOF

      # ---------------- DEPLOY ----------------

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs
