name: Build & Deploy Liquid Glass Demos

on:
  push:
    branches: [main]
  workflow_dispatch:

# ---------------- PREVENT PARALLEL BUILDS ----------------
concurrency:
  group: flutter-liquid-glass-build
  cancel-in-progress: true

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        app:
          - name: apple_music
            entry: lib/apple_music/apple_music_demo.dart
          - name: apple_podcasts
            entry: lib/apple_podcasts/apple_podcasts_demo.dart
          - name: apple_messages
            entry: lib/apple_messages/apple_messages_demo.dart
          - name: apple_news
            entry: lib/apple_news/apple_news_demo.dart

    steps:
      # ---------------- CHECKOUT FLUTTER SOURCE ----------------
      - name: Checkout Flutter source
        uses: actions/checkout@v4
        with:
          repository: sdegenaar/liquid_glass_widgets
          path: flutter_src
          fetch-depth: 0

      # ---------------- FLUTTER SETUP ----------------
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.9'
          cache: true

      # ---------------- ENABLE WEB ----------------
      - name: Enable Flutter web
        run: flutter config --enable-web

      # ---------------- ENSURE WEB SUPPORT ----------------
      - name: Ensure web support exists
        run: |
          cd flutter_src/example
          if [ ! -d "web" ]; then
            flutter create . --platforms=web
          fi

      # ---------------- DEPENDENCIES ----------------
      - name: Get dependencies
        run: |
          cd flutter_src/example
          flutter pub get

      # ---------------- BUILD ALL VARIANTS ----------------
      - name: Build Web + WASM
        run: |
          cd flutter_src/example

          APP_NAME=${{ matrix.app.name }}
          ENTRY_FILE=${{ matrix.app.entry }}

          BASE_PATH="/liquid_glass_widgets"

          echo "Building WEB + WASM for $APP_NAME"

          # ---------------- WEB (CanvasKit) ----------------
          flutter build web \
            -t "$ENTRY_FILE" \
            --release \
            --base-href "$BASE_PATH/$APP_NAME/"

          mkdir -p ../../site/$APP_NAME
          rm -rf ../../site/$APP_NAME
          cp -r build/web ../../site/$APP_NAME

          # ---------------- WASM ----------------
          flutter build web \
            -t "$ENTRY_FILE" \
            --release \
            --wasm \
            --base-href "$BASE_PATH/${APP_NAME}_wasm/"

          mkdir -p ../../site/${APP_NAME}_wasm
          rm -rf ../../site/${APP_NAME}_wasm
          cp -r build/web ../../site/${APP_NAME}_wasm

      # ---------------- UPLOAD PAGES ARTIFACT ----------------
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest

    # REQUIRED (fixes your earlier error)
    environment:
      name: github-pages

    steps:
      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
