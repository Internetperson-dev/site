name: Build & Deploy Liquid Glass Demos

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

env:
  REPO_NAME: site

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # ---------------- CHECKOUT SITE ----------------
      - name: Checkout site repo
        uses: actions/checkout@v4
        with:
          path: site

      # ---------------- CHECKOUT FLUTTER SOURCE ----------------
      - name: Checkout Flutter source
        uses: actions/checkout@v4
        with:
          repository: sdegenaar/liquid_glass_widgets
          path: flutter_src

      # ---------------- FLUTTER SETUP ----------------
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Enable Flutter web
        run: flutter config --enable-web

      # ---------------- ENSURE WEB SUPPORT ----------------
      - name: Ensure web support exists
        run: |
          cd flutter_src/example
          if [ ! -d "web" ]; then
            flutter create . --platforms=web
          fi

      # ---------------- DEPENDENCIES ----------------
      - name: Get dependencies
        run: |
          cd flutter_src/example
          flutter pub get

      # ---------------- BUILD ----------------
      - name: Build Apple Music
        run: |
          cd flutter_src/example
          flutter build web \
            -t lib/apple_music/apple_music_demo.dart \
            --release \
            --base-href /liquid_glass_widgets/apple_music/ \
            --output build/apple_music

      - name: Build Apple Podcasts
        run: |
          cd flutter_src/example
          flutter build web \
            -t lib/apple_podcasts/apple_podcasts_demo.dart \
            --release \
            --base-href /liquid_glass_widgets/apple_podcasts/ \
            --output build/apple_podcasts

      # ---------------- COPY INTO REPO ROOT ----------------
      - name: Inject builds into repo folder
        run: |
          rm -rf site/liquid_glass_widgets
          mkdir -p site/liquid_glass_widgets

          cp -r flutter_src/example/build/apple_music site/liquid_glass_widgets/
          cp -r flutter_src/example/build/apple_podcasts site/liquid_glass_widgets/

      # ---------------- PREPARE PUBLIC SITE ----------------
      - name: Create public folder
        run: |
          rm -rf public
          mkdir -p public

          cp -r site/* public/

      # ---------------- DEPLOY ----------------
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

  deploy:
    needs: build
    runs-on: ubuntu-latest

    environment:
      name: github-pages

    steps:
      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
