name: Build & Deploy Liquid Glass Demos

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # ---------------- CHECKOUT SITE ----------------
      - name: Checkout site repo
        uses: actions/checkout@v4
        with:
          path: site

      # ---------------- CHECKOUT SOURCE ----------------
      - name: Checkout liquid_glass_widgets
        uses: actions/checkout@v4
        with:
          repository: sdegenaar/liquid_glass_widgets
          path: liquid_glass_widgets

      # ---------------- FLUTTER ----------------
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Enable web
        run: flutter config --enable-web

      # ---------------- PREP ----------------
      - name: Ensure web support
        run: |
          cd liquid_glass_widgets/example
          flutter create . --platforms=web

      - name: Get dependencies
        run: |
          cd liquid_glass_widgets/example
          flutter pub get

      # ---------------- BUILD DEMOS ----------------
      - name: Build Apple Music
        run: |
          cd liquid_glass_widgets/example
          flutter build web \
            -t lib/apple_music/apple_music_demo.dart \
            --release \
            --base-href /apple_music/ \
            --output ../../build/apple_music

#      - name: Build Apple Messages
#        run: |
#          cd liquid_glass_widgets/example
#          flutter build web \
#            -t lib/apple_messages/apple_messages_demo.dart \
#            --release \
#            --base-href /apple_messages/ \
#            --output ../../build/apple_messages

#      - name: Build Apple News
#        run: |
#          cd liquid_glass_widgets/example
#          flutter build web \
#            -t lib/apple_news/apple_news_demo.dart \
#            --release \
#            --base-href /apple_news/ \
#            --output ../../build/apple_news

      - name: Build Apple Podcasts
        run: |
          cd liquid_glass_widgets/example
          flutter build web \
            -t lib/apple_podcasts/apple_podcasts_demo.dart \
            --release \
            --base-href /apple_podcasts/ \
            --output ../../build/apple_podcasts

      # ---------------- MERGE SITE + BUILDS ----------------
      - name: Create merged public folder
        run: |
          mkdir -p public

          # 1. Copy existing website
          cp -r site/. public/

          # 2. Remove old demo folders if they exist
          rm -rf public/apple_music public/apple_messages public/apple_news public/apple_podcasts

          # 3. Overlay new Flutter builds
          cp -r build/* public/

      - name: Commit merged site back to repo
        run: |
          cd site

          # Copy Flutter builds into actual repo
          rm -rf apple_music apple_messages apple_news apple_podcasts

          cp -r ../build/apple_music apple_music
          cp -r ../build/apple_messages apple_messages
          cp -r ../build/apple_news apple_news
          cp -r ../build/apple_podcasts apple_podcasts

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add .
          git commit -m "Update Flutter Liquid Glass demos" || echo "No changes to commit"

          git push

      # ---------------- UPLOAD ARTIFACT ----------------
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

  deploy:
    needs: build
    runs-on: ubuntu-latest

    environment:
      name: github-pages

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

