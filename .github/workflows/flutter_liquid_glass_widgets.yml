name: Build & Deploy Liquid Glass Demos

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # ---------------- CHECKOUT SITE ----------------
      - name: Checkout site repo
        uses: actions/checkout@v4
        with:
          path: site

      # ---------------- CHECKOUT SOURCE ----------------
      - name: Checkout liquid_glass_widgets
        uses: actions/checkout@v4
        with:
          repository: sdegenaar/liquid_glass_widgets
          path: liquid_glass_widgets

      # ---------------- FLUTTER ----------------
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Enable web
        run: flutter config --enable-web

      # ---------------- PREP ----------------
      - name: Ensure web support
        run: |
          cd liquid_glass_widgets/example
          flutter create . --platforms=web

      - name: Get dependencies
        run: |
          cd liquid_glass_widgets/example
          flutter pub get

      - name: Prepare build folder
        run: |
          rm -rf build
          mkdir -p build

      # ---------------- BUILD DEMOS ----------------

      - name: Build Apple Music
        run: |
          cd liquid_glass_widgets/example
          flutter build web \
            -t lib/apple_music/apple_music_demo.dart \
            --release \
            --base-href /site/apple_music/ \
            --output ../../build/apple_music

      - name: Build Apple Messages
        run: |
          cd liquid_glass_widgets/example
          flutter build web \
            -t lib/apple_messages/apple_messages_demo.dart \
            --release \
            --base-href /site/apple_messages/ \
            --output ../../build/apple_messages

      - name: Build Apple News
        run: |
          cd liquid_glass_widgets/example
          flutter build web \
            -t lib/apple_news/apple_news_demo.dart \
            --release \
            --base-href /site/apple_news/ \
            --output ../../build/apple_news

      - name: Build Apple Podcasts
        run: |
          cd liquid_glass_widgets/example
          flutter build web \
            -t lib/apple_podcasts/apple_podcasts_demo.dart \
            --release \
            --base-href /site/apple_podcasts/ \
            --output ../../build/apple_podcasts

      # ---------------- PACKAGE ----------------
      - name: Create Pages folder
        run: |
          mkdir -p public
          cp -r build/* public/

      # ---------------- UPLOAD ARTIFACT ----------------
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

  deploy:
    needs: build
    runs-on: ubuntu-latest

    environment:
      name: github-pages

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
