name: Build & Deploy Liquid Glass Demos

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: flutter-liquid-glass-build
  cancel-in-progress: true

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # ---------------- CHECKOUT ----------------
      - name: Checkout repo
        uses: actions/checkout@v4

      # ---------------- FLUTTER ----------------
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.41.9"
          cache: true

      - name: Enable web
        run: flutter config --enable-web

      # ---------------- DEPENDENCIES ----------------
      - name: Get dependencies
        run: |
          cd flutter_src/example || cd example || true

      # If your example folder is inside repo:
      - name: Install dependencies
        run: |
          cd example
          flutter pub get

      # ---------------- BUILD ALL APPS ----------------
      - name: Build Web + WASM
        run: |
          cd example

          PUBLIC_DIR="../public"
          BASE="/liquid_glass_widgets"

          mkdir -p "$PUBLIC_DIR"

          build_app () {
            NAME=$1
            ENTRY=$2

            echo "=============================="
            echo "Building WEB: $NAME"
            echo "=============================="

            flutter build web \
              -t "$ENTRY" \
              --release \
              --base-href "$BASE/$NAME/"

            rm -rf "$PUBLIC_DIR/$NAME"
            mkdir -p "$PUBLIC_DIR/$NAME"
            cp -r build/web/* "$PUBLIC_DIR/$NAME/"

            echo "=============================="
            echo "Building WASM: $NAME"
            echo "=============================="

            flutter build web \
              -t "$ENTRY" \
              --release \
              --wasm \
              --base-href "$BASE/${NAME}_wasm/"

            rm -rf "$PUBLIC_DIR/${NAME}_wasm"
            mkdir -p "$PUBLIC_DIR/${NAME}_wasm"
            cp -r build/web/* "$PUBLIC_DIR/${NAME}_wasm/"
          }

          build_app apple_music lib/apple_music/apple_music_demo.dart
          build_app apple_podcasts lib/apple_podcasts/apple_podcasts_demo.dart
          build_app apple_messages lib/apple_messages/apple_messages_demo.dart
          build_app apple_news lib/apple_news/apple_news_demo.dart

      # ---------------- UPLOAD PAGES ----------------
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

  deploy:
    needs: build
    runs-on: ubuntu-latest

    environment:
      name: github-pages

    steps:
      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
